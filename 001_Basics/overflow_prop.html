<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overflow property in Tailwind CSS</title>
    <link rel="stylesheet" href='../output.css'>
</head>
<body>
    <div class="bg-red-500 size-50 p-1 m-3">
        <div class="h-48 w-100 bg-blue-400 p-1">
            a Div without any overflow property...
        </div>
    </div>
    <div class="bg-red-500 size-50 p-1 m-3 overflow-auto">
        <div class="h-48 w-100 bg-blue-400 p-1">
            a Div with overflow-auto property...
        </div>
    </div>
    <div class="bg-red-500 size-50 p-1 m-3 overflow-clip">
        <div class="h-48 w-100 bg-blue-400 p-1">
            a Div with overflow-clip property...
        </div>
    </div>
    <div class="bg-red-500 size-50 p-1 m-3 overflow-hidden">
        <div class="h-48 w-100 bg-blue-400 p-1">
            a Div with overflow-hidden property...
        </div>
    </div>
    <div class="bg-red-500 size-50 p-1 m-3 overflow-scroll">
        <div class="h-48 w-100 bg-blue-400 p-1">
            a Div with overflow-scroll property...
        </div>
    </div>
</body>
</html>
