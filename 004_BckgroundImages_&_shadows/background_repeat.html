<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG repeat Property in Tailwind</title>
    <link rel="stylesheet" href="../output.css">
</head>
<body class="p-10">
    <h1 class="font-medium text-3xl m-2">Bg Repeat : (Default)</h1>
    <div class="h-55 w-4/5 bg-red-300 bg-[url(004_BckgroundImages_&_shadows/papper.png)]">
    </div>

    <h1 class="font-medium text-3xl m-2">Bg No Repeat :</h1>
    <div class="h-55 w-4/5 bg-red-300 bg-[url(004_BckgroundImages_&_shadows/papper.png)] bg-no-repeat">
    </div>

    <h1 class="font-medium text-3xl m-2">Bg Repeat in x axis (horizontal) :</h1>
    <div class="h-55 w-4/5 bg-red-300 bg-[url(004_BckgroundImages_&_shadows/papper.png)] bg-repeat-x">
    </div>

    <h1 class="font-medium text-3xl m-2">Bg Repeat in y axis (vertical) :</h1>
    <div class="h-55 w-4/5 bg-red-300 bg-[url(004_BckgroundImages_&_shadows/papper.png)] bg-repeat-y">
    </div>

    <h1 class="font-medium text-3xl m-2">Bg Repeat whit space :</h1>
    <div class="h-55 w-4/5 bg-red-300 bg-[url(004_BckgroundImages_&_shadows/papper.png)] bg-repeat-space">
    </div>

    <h1 class="font-medium text-3xl m-2">Bg Repeat round :</h1>
    <div class="h-55 w-4/5 bg-red-300 bg-[url(004_BckgroundImages_&_shadows/papper.png)] bg-repeat-round">
    </div>
</body>
</html>
