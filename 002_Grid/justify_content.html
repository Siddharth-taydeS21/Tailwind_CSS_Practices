<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justify content Properties of Grid</title>
    <link rel="stylesheet" href="../output.css">
</head>
<body class="p-1">
    <h1 class="font-bold text-3xl">Justify content Center</h1>
    <div class="h-fit w-full bg-red-400 grid grid-cols-[repeat(3,90px)] gap-5 p-5 justify-center  mb-10">
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">01</div>
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">02</div>
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">03</div>
    </div>

    <h1 class="font-bold text-3xl">Justify content start</h1>
    <div class="h-fit w-full bg-red-400 grid grid-cols-[repeat(3,90px)] gap-5 p-5 justify-start  mb-10">
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">01</div>
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">02</div>
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">03</div>
    </div>

    <h1 class="font-bold text-3xl">Justify content end</h1>
    <div class="h-fit w-full bg-red-400 grid grid-cols-[repeat(3,90px)] gap-5 p-5 justify-end  mb-10">
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">01</div>
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">02</div>
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">03</div>
    </div>

    <h1 class="font-bold text-3xl">Justify content space-between</h1>
    <div class="h-fit w-full bg-red-400 grid grid-cols-[repeat(3,90px)] gap-5 p-5 justify-between  mb-10">
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">01</div>
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">02</div>
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">03</div>
    </div>

    <h1 class="font-bold text-3xl">Justify content space-around</h1>
    <div class="h-fit w-full bg-red-400 grid grid-cols-[repeat(3,90px)] gap-5 p-5 justify-around  mb-10">
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">01</div>
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">02</div>
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">03</div>
    </div>

    <h1 class="font-bold text-3xl">Justify content space evenly</h1>
    <div class="h-fit w-full bg-red-400 grid grid-cols-[repeat(3,90px)] gap-5 p-5 justify-evenly  mb-10">
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">01</div>
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">02</div>
        <div class="bg-blue-400 rounded-2xl font-bold text-center p-10">03</div>
    </div>
</body>
</html>
